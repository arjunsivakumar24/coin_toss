<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortune's Coin</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#FFD700;--gold2:#FFA500;--gold-g:rgba(255,200,0,.65);
  --silver:#C8C8D8;--silver-g:rgba(180,180,220,.6);--bg:#04060e}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:'Cinzel',serif;color:#fff;user-select:none;cursor:default}

/* BG */
#bg{position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 90% 55% at 50% -5%,rgba(70,50,160,.22) 0%,transparent 65%),
  radial-gradient(ellipse 60% 45% at 90% 110%,rgba(20,60,150,.14) 0%,transparent 65%),#04060e}
#bg canvas{position:absolute;inset:0;width:100%;height:100%}

/* APP */
#app{position:relative;z-index:1;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center}

/* TITLE */
#title{font-family:'Cinzel Decorative',cursive;
  font-size:clamp(1.3rem,3.8vw,2.6rem);font-weight:900;letter-spacing:.22em;
  background:linear-gradient(135deg,#fff8c0 0%,#FFD700 40%,#ffe880 60%,#B8860B 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 16px var(--gold-g)) drop-shadow(0 0 38px rgba(255,170,0,.35));
  animation:titleP 3s ease-in-out infinite;margin-bottom:.25em}
@keyframes titleP{0%,100%{filter:drop-shadow(0 0 12px var(--gold-g))}
  50%{filter:drop-shadow(0 0 26px rgba(255,215,0,.95)) drop-shadow(0 0 55px rgba(255,160,0,.5))}}

/* BOARD */
#board{display:flex;gap:2.4em;margin-bottom:1.2em;
  font-size:clamp(.65rem,1.7vw,.95rem);letter-spacing:.14em}
.si{display:flex;flex-direction:column;align-items:center;gap:.18em}
.sl{font-size:.72em;opacity:.55;letter-spacing:.2em;text-transform:uppercase}
.sv{font-family:'Cinzel Decorative',cursive;font-size:1.55em;font-weight:700}
#hs .sv{color:var(--gold);text-shadow:0 0 10px var(--gold-g)}
#ts .sv{color:var(--silver);text-shadow:0 0 10px var(--silver-g)}
#ns .sv{color:rgba(255,255,255,.65)}
.bump{animation:bmp .38s ease}
@keyframes bmp{0%,100%{transform:scale(1)}50%{transform:scale(1.55)}}

/* STAGE */
#stage{position:relative;
  width:clamp(200px,36vw,360px);height:clamp(200px,36vw,360px);
  display:flex;align-items:center;justify-content:center;margin-bottom:1.2em}
#stage::before{content:'';position:absolute;inset:-18px;border-radius:50%;
  border:1.5px solid rgba(255,215,0,.12);animation:ring 11s linear infinite}
#stage::after{content:'';position:absolute;inset:-38px;border-radius:50%;
  border:1px dashed rgba(255,215,0,.07);animation:ring 20s linear infinite reverse}
@keyframes ring{to{transform:rotate(360deg)}}

#fshadow{position:absolute;bottom:3%;width:52%;height:13%;border-radius:50%;
  background:radial-gradient(ellipse,rgba(0,0,0,.75) 0%,transparent 70%);
  transform:scaleY(.4);transition:opacity .25s}

#coinCanvas{position:absolute;display:block;
  width:clamp(120px,22vw,220px);height:clamp(120px,22vw,220px);
  will-change:transform}

/* BTN */
#btn{position:relative;padding:.72em 2.8em;
  font-family:'Cinzel Decorative',cursive;
  font-size:clamp(.82rem,2vw,1.15rem);font-weight:700;
  letter-spacing:.22em;text-transform:uppercase;color:#1a0a00;
  border:none;outline:none;border-radius:3em;cursor:pointer;
  background:linear-gradient(135deg,#fff0a0 0%,#FFD700 35%,#FFA500 65%,#B8860B 100%);
  box-shadow:0 0 0 2px rgba(255,215,0,.35),0 0 18px rgba(255,175,0,.5),
             0 0 45px rgba(255,140,0,.28),0 6px 18px rgba(0,0,0,.5);
  transition:transform .14s,box-shadow .14s,filter .14s;overflow:hidden}
#btn::before{content:'';position:absolute;top:0;left:-110%;width:55%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.32),transparent);
  transform:skewX(-20deg);transition:left .45s}
#btn:hover::before{left:155%}
#btn:hover:not(:disabled){transform:translateY(-3px) scale(1.04);
  box-shadow:0 0 0 2px rgba(255,215,0,.6),0 0 28px rgba(255,200,0,.75),
             0 0 65px rgba(255,140,0,.5),0 10px 28px rgba(0,0,0,.5);filter:brightness(1.1)}
#btn:active:not(:disabled){transform:translateY(1px) scale(.98)}
#btn:disabled{cursor:not-allowed;opacity:.42;box-shadow:0 2px 8px rgba(0,0,0,.4)}

/* STREAK */
#streak{margin-top:.6em;font-size:clamp(.58rem,1.4vw,.82rem);letter-spacing:.2em;
  opacity:0;transition:opacity .4s;text-transform:uppercase;
  color:var(--gold);text-shadow:0 0 10px var(--gold-g)}
#streak.on{opacity:1}

/* HIST */
#hist{position:fixed;bottom:1em;left:50%;transform:translateX(-50%);
  display:flex;gap:.38em;z-index:10}
.hd{width:clamp(7px,1.4vw,11px);height:clamp(7px,1.4vw,11px);border-radius:50%;
  border:1.5px solid rgba(255,255,255,.18);animation:dp .4s cubic-bezier(.175,.885,.32,1.275)}
.hd.h{background:var(--gold);box-shadow:0 0 5px var(--gold-g)}
.hd.t{background:var(--silver);box-shadow:0 0 5px var(--silver-g)}
@keyframes dp{from{transform:scale(0)}to{transform:scale(1)}}

/* OVERLAY */
#overlay{position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;transition:opacity .5s}
#overlay.on{opacity:1;pointer-events:auto}
#obg{position:absolute;inset:0}
#oc{position:relative;z-index:2;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:.45em;
  transform:scale(.4) translateY(50px);
  transition:transform .65s cubic-bezier(.175,.885,.32,1.275)}
#overlay.on #oc{transform:scale(1) translateY(0)}
#ow{font-family:'Cinzel Decorative',cursive;
  font-size:clamp(4.5rem,20vw,15rem);font-weight:900;line-height:.88;letter-spacing:.04em}
#osub{font-size:clamp(.85rem,2.8vw,1.7rem);letter-spacing:.32em;opacity:.75;text-transform:uppercase}
#otap{margin-top:1.4em;font-size:clamp(.65rem,1.7vw,.95rem);letter-spacing:.3em;
  opacity:0;animation:tb 1.4s ease-in-out 1.1s infinite;text-transform:uppercase}
@keyframes tb{0%,100%{opacity:.25}50%{opacity:.85}}

.pt{position:fixed;border-radius:50%;pointer-events:none;z-index:201}

@media(max-height:600px){
  #stage{width:clamp(150px,28vw,210px);height:clamp(150px,28vw,210px)}
  #title{font-size:clamp(.95rem,2.8vw,1.6rem);margin-bottom:.1em}
  #board{margin-bottom:.5em}}
</style>
</head>
<body>
<div id="bg"><canvas id="sc"></canvas></div>
<div id="app">
  <div id="title">Fortune's Coin</div>
  <div id="board">
    <div class="si" id="hs"><span class="sl">Heads</span><span class="sv" id="hv">0</span></div>
    <div class="si" id="ns"><span class="sl">Tosses</span><span class="sv" id="nv">0</span></div>
    <div class="si" id="ts"><span class="sl">Tails</span><span class="sv" id="tv">0</span></div>
  </div>
  <div id="stage">
    <div id="fshadow"></div>
    <canvas id="coinCanvas"></canvas>
  </div>
  <button id="btn">✦ Toss ✦</button>
  <div id="streak"></div>
</div>
<div id="hist"></div>
<div id="overlay">
  <div id="obg"></div>
  <div id="oc">
    <div id="ow">HEADS</div>
    <div id="osub">Fortune has spoken</div>
    <div id="otap">Tap anywhere to continue</div>
  </div>
</div>

<script>
/* ── STARS ── */
(()=>{
  const c=document.getElementById('sc'),ctx=c.getContext('2d');
  let s=[];
  const resize=()=>{
    c.width=innerWidth;c.height=innerHeight;
    s=Array.from({length:200},()=>({x:Math.random()*c.width,y:Math.random()*c.height,
      r:.3+Math.random()*1.5,a:Math.random(),da:.003+Math.random()*.008}));
  };
  const draw=()=>{
    ctx.clearRect(0,0,c.width,c.height);
    s.forEach(o=>{o.a+=o.da;if(o.a>1||o.a<0)o.da*=-1;
      ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${o.a.toFixed(2)})`;ctx.fill();});
    requestAnimationFrame(draw);
  };
  window.addEventListener('resize',resize);resize();draw();
})();

/* ── COIN CANVAS ── */
const CC=document.getElementById('coinCanvas');
const ctx=CC.getContext('2d');
let CW=220,CH=220,DPR=1;

function resizeCoin(){
  const r=CC.getBoundingClientRect();
  DPR=window.devicePixelRatio||1;
  CC.width=r.width*DPR; CC.height=r.height*DPR;
  CW=r.width; CH=r.height;
}
resizeCoin();
window.addEventListener('resize',resizeCoin);

/* draw coin face given scaleX in [-1,1] */
function drawCoin(faceIsHeads, scaleX){
  ctx.save();
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,CW,CH);
  const cx=CW/2, cy=CH/2;
  const R=Math.min(CW,CH)*.455;
  const rx=R*Math.abs(scaleX);
  if(rx<0.5){ctx.restore();return;}

  /* which face shows: positive scaleX = front, negative = back */
  const showH = scaleX>=0 ? faceIsHeads : !faceIsHeads;

  ctx.translate(cx,cy);

  /* RIM / EDGE */
  const rimW=Math.max(2, R*.12*(1-Math.abs(scaleX))+ R*.04);
  const rimG=ctx.createLinearGradient(-(rx+rimW),0,(rx+rimW),0);
  if(showH){rimG.addColorStop(0,'#2e1800');rimG.addColorStop(.45,'#c8900a');rimG.addColorStop(.55,'#ffe080');rimG.addColorStop(1,'#2e1800');}
  else{rimG.addColorStop(0,'#111120');rimG.addColorStop(.45,'#6868a0');rimG.addColorStop(.55,'#c0c0d8');rimG.addColorStop(1,'#111120');}
  ctx.beginPath();ctx.ellipse(0,0,rx+rimW,R,0,0,Math.PI*2);
  ctx.fillStyle=rimG;ctx.fill();

  /* FACE */
  const fg=ctx.createRadialGradient(-rx*.3,-R*.32,R*.04,-rx*.08,-R*.08,R*1.05);
  if(showH){
    fg.addColorStop(0,'#FFFBD8');fg.addColorStop(.18,'#FFD700');
    fg.addColorStop(.5,'#C08800');fg.addColorStop(.82,'#7A5000');fg.addColorStop(1,'#3A2000');
  }else{
    fg.addColorStop(0,'#FFFFFF');fg.addColorStop(.18,'#D8D8EC');
    fg.addColorStop(.5,'#9090B0');fg.addColorStop(.82,'#505068');fg.addColorStop(1,'#202030');
  }
  ctx.beginPath();ctx.ellipse(0,0,rx,R,0,0,Math.PI*2);
  ctx.fillStyle=fg;ctx.fill();

  /* SPECULAR HIGHLIGHT */
  const hg=ctx.createRadialGradient(-rx*.38,-R*.4,0,-rx*.12,-R*.18,R*.6);
  hg.addColorStop(0,'rgba(255,255,255,.55)');
  hg.addColorStop(.45,'rgba(255,255,255,.1)');
  hg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.ellipse(0,0,rx,R,0,0,Math.PI*2);
  ctx.fillStyle=hg;ctx.fill();

  /* INNER RIM */
  ctx.beginPath();ctx.ellipse(0,0,rx*.87,R*.87,0,0,Math.PI*2);
  ctx.strokeStyle=showH?'rgba(255,235,100,.25)':'rgba(255,255,255,.18)';
  ctx.lineWidth=R*.022;ctx.stroke();

  /* OUTER RIM LINE */
  ctx.beginPath();ctx.ellipse(0,0,rx*.98,R*.98,0,0,Math.PI*2);
  ctx.strokeStyle=showH?'rgba(180,120,0,.4)':'rgba(80,80,120,.4)';
  ctx.lineWidth=R*.018;ctx.stroke();

  /* SYMBOL */
  if(rx>R*.15){
    const fs=Math.min(R*.65, R*.65*(rx/R));
    ctx.font=`900 ${fs}px 'Cinzel Decorative',serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    /* depth shadow */
    ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillText(showH?'H':'T', rx*.025, R*.042);
    /* main */
    ctx.fillStyle=showH?'#3D2200':'#181830';ctx.fillText(showH?'H':'T',0,0);
    /* sheen */
    ctx.fillStyle=showH?'rgba(255,230,100,.45)':'rgba(255,255,255,.35)';
    ctx.fillText(showH?'H':'T',-rx*.015,-R*.028);
  }

  /* BOTTOM VIGNETTE */
  const bv=ctx.createRadialGradient(rx*.15,R*.3,0,0,R*.15,R);
  bv.addColorStop(0,'rgba(0,0,0,.2)');bv.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.ellipse(0,0,rx,R,0,0,Math.PI*2);
  ctx.fillStyle=bv;ctx.fill();

  ctx.restore();
}

/* ── PHYSICS ENGINE ── */
const shadow=document.getElementById('fshadow');
let state='idle'; // idle | fly | bounce
let coinIsHeads=true;
let spinAngle=0, spinSpeed=0;
let posY=0, velY=0;
let gravity=0;
let gone=false;       // coin has left viewport top
let settled=false;    // result decided, slowing spin
let bV=0;             // bounce velocity
let idleT=0;
let lastT=null;

function loop(ts){
  if(!lastT)lastT=ts;
  const dt=Math.min(ts-lastT,30);lastT=ts;

  if(state==='idle'){
    idleT+=dt*.001;
    const floatY=Math.sin(idleT*1.05)*5;
    CC.style.transform=`translateY(${floatY}px)`;
    shadow.style.opacity='1';
    shadow.style.transform=`scaleY(.4) scaleX(${.82+Math.sin(idleT*1.05)*.05})`;
    drawCoin(coinIsHeads, coinIsHeads ? 1 : -1);

  }else if(state==='fly'){
    spinAngle+=spinSpeed*dt;
    posY+=velY*dt;
    velY+=gravity*dt;

    const screenCenter=window.innerHeight/2;
    const coinScreenY=screenCenter+posY;

    /* coin left viewport upward */
    if(!gone && coinScreenY<-CH/2) gone=true;

    /* settle spin once coin is coming back down and past 20% from top */
    if(gone && !settled && velY>0 && coinScreenY>window.innerHeight*.12){
      settled=true;
      /* target: heads=0 (cos=+1 shows front), tails=Math.PI (cos=-1 shows back=tails) */
      const target = coinIsHeads ? 0 : Math.PI;
      /* find nearest multiple of 2π above current angle that lands on target */
      const fullTurns = Math.ceil(spinAngle / (Math.PI*2));
      spinAngle = fullTurns * Math.PI*2 + target;
      spinSpeed = 0.006; /* slow crawl toward final angle */
    }

    /* slow spin to a stop as it nears final angle */
    if(settled){
      const target = coinIsHeads ? 0 : Math.PI;
      const fullTurns = Math.round((spinAngle - target) / (Math.PI*2));
      const finalAngle = fullTurns * Math.PI*2 + target;
      const diff = finalAngle - spinAngle;
      spinAngle += diff * 0.12; /* lerp toward exact */
      spinSpeed = 0;
    }

    /* landed */
    if(settled && posY>=0){
      posY=0;velY=0;
      spinAngle = coinIsHeads ? 0 : Math.PI;
      spinSpeed=0;
      state='bounce';bV=-5.5;
      CC.style.transform='translateY(0px)';
      shadow.style.opacity='1';
      shadow.style.transform='scaleY(.4) scaleX(.86)';
    }

    /* shadow: shrink as coin goes up */
    const pct=Math.max(0,Math.min(1,coinScreenY/window.innerHeight));
    shadow.style.opacity=String(.1+pct*.9);
    shadow.style.transform=`scaleY(.4) scaleX(${.2+pct*.66})`;

    /* move canvas */
    CC.style.transform=`translateY(${posY}px)`;
    drawCoin(coinIsHeads,Math.cos(spinAngle));

  }else if(state==='bounce'){
    bV+=0.72;
    posY+=bV;
    if(posY>=0){
      posY=0;bV*=-.38;
      if(Math.abs(bV)<.6){posY=0;bV=0;land();}
    }
    CC.style.transform=`translateY(${posY}px)`;
    drawCoin(coinIsHeads, coinIsHeads ? 1 : -1);
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function land(){
  state='idle';idleT=0;
  showResult();
}

/* ── TOSS ── */
document.getElementById('btn').addEventListener('click',toss);
document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='Enter'){
    if(document.getElementById('overlay').classList.contains('on'))dismiss();
    else toss();
  }
});

function toss(){
  if(state!=='idle')return;
  coinIsHeads=Math.random()<.5;
  gone=false;settled=false;
  spinAngle=0;
  spinSpeed=0.026+Math.random()*.01; /* ~1.5 full rotations/sec = very smooth fast spin */
  posY=0;

  /* launch velocity: must be strong enough to clear top of viewport */
  const stageEl=document.getElementById('stage');
  const rect=stageEl.getBoundingClientRect();
  const distToTop=rect.top+rect.height/2+CH/2+20; /* px to clear viewport */
  /* solve: 0 = distToTop + velY*t + .5*g*t^2 for a nice arc */
  /* simple: velY = -sqrt(2*g*distToTop) with g in px/ms^2 */
  gravity=0.00092;
  velY=-Math.sqrt(2*gravity*distToTop)*1.08; /* a little extra to ensure full exit */

  state='fly';
  document.getElementById('btn').disabled=true;
}

/* ── RESULT ── */
let scores={heads:0,tails:0,total:0};
let sk={side:null,count:0};
let hist=[];
const MH=15;

function showResult(){
  const r=coinIsHeads?'heads':'tails';
  scores[r]++;scores.total++;
  document.getElementById('hv').textContent=scores.heads;
  document.getElementById('tv').textContent=scores.tails;
  document.getElementById('nv').textContent=scores.total;
  const el=document.getElementById(coinIsHeads?'hs':'ts').querySelector('.sv');
  el.classList.remove('bump');void el.offsetWidth;el.classList.add('bump');

  if(sk.side===r){sk.count++;}else{sk.side=r;sk.count=1;}
  const se=document.getElementById('streak');
  if(sk.count>=3){se.textContent=`🔥 ${sk.count}× ${r.toUpperCase()} STREAK!`;se.classList.add('on');}
  else se.classList.remove('on');

  hist.push(r);if(hist.length>MH)hist.shift();
  renderHist();
  spawnParticles(coinIsHeads);

  const ow=document.getElementById('ow'),osub=document.getElementById('osub'),obg=document.getElementById('obg');
  ow.textContent=r.toUpperCase();
  osub.textContent=coinIsHeads?'✦ The Eagle Prevails ✦':'✦ The Moon Rises ✦';
  if(coinIsHeads){
    ow.style.color='#FFD700';
    ow.style.textShadow='0 0 35px rgba(255,215,0,.95),0 0 90px rgba(255,180,0,.65),0 0 160px rgba(255,120,0,.3)';
    obg.style.background='radial-gradient(ellipse at center,rgba(70,40,0,.94) 0%,rgba(8,4,0,.97) 100%)';
  }else{
    ow.style.color='#C8C8F0';
    ow.style.textShadow='0 0 35px rgba(180,180,230,.95),0 0 90px rgba(130,130,210,.65),0 0 160px rgba(80,80,180,.3)';
    obg.style.background='radial-gradient(ellipse at center,rgba(15,15,45,.94) 0%,rgba(4,4,14,.97) 100%)';
  }
  document.getElementById('overlay').classList.add('on');
}

document.getElementById('overlay').addEventListener('click',dismiss);
function dismiss(){
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('btn').disabled=false;
}

function renderHist(){
  const el=document.getElementById('hist');el.innerHTML='';
  hist.forEach(r=>{const d=document.createElement('div');d.className='hd '+(r==='heads'?'h':'t');el.appendChild(d);});
}

function spawnParticles(ih){
  const cols=ih?['#FFD700','#FFF0A0','#FFA500','#FFEC6E']:['#C0C0C0','#E8E8F8','#A0A0C0','#FFFFFF'];
  for(let i=0;i<48;i++){
    const p=document.createElement('div');p.className='pt';
    const sz=4+Math.random()*12;
    p.style.cssText=`width:${sz}px;height:${sz}px;
      background:${cols[Math.floor(Math.random()*cols.length)]};
      left:${28+Math.random()*44}vw;top:${20+Math.random()*60}vh;
      box-shadow:0 0 ${sz*2.2}px ${cols[0]};
      border-radius:${Math.random()>.4?'50%':'4px'}`;
    document.body.appendChild(p);
    const a=Math.random()*Math.PI*2,sp=100+Math.random()*240;
    p.animate([
      {transform:'translate(0,0) scale(1)',opacity:1},
      {transform:`translate(${Math.cos(a)*sp}px,${Math.sin(a)*sp-110}px) scale(0)`,opacity:0}
    ],{duration:650+Math.random()*950,easing:'cubic-bezier(0,0,.22,1)',fill:'forwards'})
    .finished.then(()=>p.remove());
  }
}
</script>
</body>
</html>
